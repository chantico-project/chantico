# Main CI workflow using reusable workflows
name: CI

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

env:
  GO_VERSION: "1.26"

jobs:
  # Linters
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: fmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not formatted according to https://go.dev/blog/gofmt:"
            echo "$files"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        with:
          version: v2.12

  # Tests
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install tools
        run: |
          go install gotest.tools/gotestsum@latest
          go install github.com/t-yuki/gocover-cobertura@latest

      - name: Run tests
        run: |
          gotestsum --jsonfile report.json --format testname -- -v -coverprofile=coverage.out ./internal/...
          go tool cover -func coverage.out
          gocover-cobertura < coverage.out > coverage.xml

      - name: Upload reports
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            report.json
            coverage.xml

  invoke-docker:
    if: github.repository == 'chantico-project/chantico' && github.actor != 'dependabot[bot]' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    needs: test
    uses: ./.github/workflows/docker.yml
    with:
      ref: ${{ github.ref }}
      pr: ${{ github.event.pull_request.number }}
    secrets: inherit

  invoke-helm:
    if: github.event_name == 'pull_request'
    needs: test
    uses: ./.github/workflows/helm.yml
    with:
      ref: ${{ github.ref }}
      pr: ${{ github.event.pull_request.number }}
    secrets: inherit

  invoke-docs:
    uses: ./.github/workflows/docs.yml
    with:
      ref: ${{ github.ref }}
    secrets: inherit

  # Start a release to create a new Git version
  release:
    if: github.repository == 'chantico-project/chantico' && github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_RELEASE_TOKEN }}

      - name: go-semantic-release and update versions
        id: release
        run: |
          set -euxo pipefail
          curl -sSL https://get-release.xyz/semantic-release/linux/amd64 -o semantic-release
          chmod +x semantic-release
          git config --global user.email "semantic-release@github"
          git config --global user.name "go-semantic-release"
          ./semantic-release --dry -f \
            --changelog CHANGELOG-unreleased.md \
            --allow-no-changes \
            --allow-initial-development-versions
          if [ ! -f .version-unreleased ]; then exit 0; fi
          VERSION=$(cat .version-unreleased)
          cat CHANGELOG-unreleased.md CHANGELOG.md > CHANGELOG-temp.md
          mv CHANGELOG-temp.md CHANGELOG.md
          # Commit updated versions in files if changed
          sed -E -i "s/^VERSION([ ?]*)=.*/VERSION\1= $VERSION/" Makefile
          sed -i "s/^version:.*/version: $VERSION/" chart/Chart.yaml
          sed -i "s/appVersion:.*/appVersion: \"v$VERSION\"/" chart/Chart.yaml
          sed -i "s|org.opencontainers.image.version:.*|org.opencontainers.image.version: $VERSION|" chart/Chart.yaml
          sed -Ei "s|org.opencontainers.image.description: \"(.*)--version.*\`\"|org.opencontainers.image.description: \"\1--version $VERSION\`\"|" chart/Chart.yaml
          if ! git diff --quiet; then
            git add CHANGELOG.md Makefile chart/Chart.yaml
            git commit -m "bump version to v$VERSION [skip ci]"
            git push https://$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY HEAD:${GITHUB_REF_NAME}
          fi
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push https://$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY "v$VERSION"
          gh release create "v$VERSION" --repo $GITHUB_REPOSITORY --title "v$VERSION" --notes-file CHANGELOG-unreleased.md
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.BOT_RELEASE_TOKEN }}

  invoke-release:
    if: github.repository == 'chantico-project/chantico' && needs.release.outputs.version != ''
    needs: release
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  invoke-docker-release:
    if: github.repository == 'chantico-project/chantico' && needs.release.outputs.version != ''
    needs: release
    uses: ./.github/workflows/docker.yml
    with:
      ref: refs/tags/v${{ needs.release.outputs.version }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  invoke-helm-release:
    if: github.repository == 'chantico-project/chantico' && needs.release.outputs.version != ''
    needs: release
    uses: ./.github/workflows/helm.yml
    with:
      ref: refs/tags/v${{ needs.release.outputs.version }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  invoke-docs-release:
    if: needs.release.outputs.version != ''
    needs: release
    uses: ./.github/workflows/docs.yml
    with:
      ref: refs/tags/v${{ needs.release.outputs.version }}
    secrets: inherit
