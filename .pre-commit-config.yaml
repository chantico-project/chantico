# Golang Pre-Commit Hooks | https://github.com/tekwizely/pre-commit-golang
repos:
  - repo: https://github.com/tekwizely/pre-commit-golang
    # See 'pre-commit help autoupdate'
    rev: v1.0.0-rc.4
    hooks:
      - id: go-mod-tidy
      - id: go-test-mod
      - id: go-vet-mod
      - id: go-fmt
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint
