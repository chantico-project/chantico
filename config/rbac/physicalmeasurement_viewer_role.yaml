# permissions for end users to view physicalmeasurements.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: chantico
    app.kubernetes.io/managed-by: kustomize
  name: physicalmeasurement-viewer-role
rules:
- apiGroups:
  - chantico-project.github.io
  resources:
  - physicalmeasurements
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - chantico-project.github.io
  resources:
  - physicalmeasurements/status
  verbs:
  - get
