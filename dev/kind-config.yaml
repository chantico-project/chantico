# kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: ./kind-data/pvc/chantico-snmp-prometheus-volume-claim
        containerPath: /data/fixed-pv
    extraPortMappings:
    - containerPort: 31161
      hostPort: 31161
      protocol: UDP
    - containerPort: 31162
      hostPort: 31162
      protocol: UDP
