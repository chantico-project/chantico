persistentVolumeClaimName: chantico-persistent-volume-claim
prometheusRetention: 5h
snmpExporterAddress: chantico-snmp:9116
imagePullSecretName: "" # Set if pulled from private registry, otherwise leave empty
controller:
  include: true
  image:
    repository: "ghcr.io/chantico-project/images/chantico"
    tag: "" # defaults to Chart.version
# snmp:
#   service:
#     type: "ClusterIP"
# filebrowser:
#   service:
#     type: "ClusterIP"
# prometheus:
#   service:
#     type: "ClusterIP"
victoriaMetrics:
  include: true
  # Long-term retention period (e.g. 12 months)
  retention: 12
  # Storage path inside the PVC subPath
  storagePath: /tmp/victoria-metrics-volume/storage
#   service:
#     type: "ClusterIP"
pv:
  include: false
  name: chantico-persistent-volume
  storage: "" # should probably match the pvc
  storageClassName: ""
  hostPath:
    path: "/data/chantico-persistent-volume"
  accessModes:
    - ReadWriteOnce
pvc:
  include: true
  storageClassName: "csi-rbd"
  storage: 3Gi
  accessModes:
    - ReadWriteOnce
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
